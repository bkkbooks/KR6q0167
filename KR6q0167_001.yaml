body:
  text: 萬峰沙門法藏著參學弟子上履閲臨濟宗嘗見繪事家圖七佛之始始于威音王佛惟大作一圓相之後則七佛各有言詮言詮雖異而諸佛之偈旨不出圓相也夫威者形之外者也音者聲之外者也威音王者形聲之外未有出載無所考據文字已前最上事也若龍樹所現而仰上所謂無相三昧然燈已前是也圓相出于西天諸祖七佛偈出于達磨傳來蓋有所本也嘗試原之圓相早具五家宗旨矣五宗各出一面然有正宗第一先出臨濟宗旨此相拋出直下斷人命根于一中賓主輥輥直入首羅眼中所謂沿流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨是也次則雲門三句一字關也溈仰圓相本于此也法眼談教義於六相之外曹洞分回互于黑白之交只一中五宗具矣其餘傍出道理極則教家玄妙淵微莫不悉備故七佛各以一偈攝之毗婆尸佛偈曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住蓋以身有相而無相直截痛快臨濟宗也中間微露其旨雲門宗也無相中受圓相之謂溈仰宗也身無相六相義之謂法眼宗也身兼無相曹洞五位之旨也其餘六佛及四七諸祖莫不同此矣但未明言顯示耳至般若多羅讖曰二株嫩桂久昌昌此鉗記五宗之分從二家始矣故有南嶽青原為五宗之源也又曰震旦難濶無別路要使兒孫腳下行金雞解銜一粒粟供養十方羅漢僧此記當有馬姓者出于十邡為二株之正宗腳下當出四宗而惟臨濟一宗為正的也及初祖至金陵武帝問造寺度僧有功德否祖曰實無功德此臨濟直截語也雲門法眼溈仰何所不具帝問何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實豈非曹洞語乎至二祖有居士請懺罪祖曰將罪來與汝懺士良久曰覔罪了不可得祖曰與汝懺罪竟一將罪來一懺罪竟臨濟雲門宗也問答歷然溈仰法眼曹洞宗也沙彌問三祖乞解脫法門祖曰誰縛汝此非臨濟雲門宗乎栽松道者問四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化邪儻若再來吾尚遲汝此語全看則臨濟雲門細開闔之則諸宗悉具矣五祖接盧能以杖擊碓三下非臨濟張本乎六祖問南嶽曰何處來曰嵩山祖曰什麼物與麼來曰說似一物即不中祖曰還有修證否曰修證即不無染污即不得觀讓公說似一物即不中語此臨濟宗而亦雲門之旨也修證即不無染污即不得寧非溈仰法眼宗旨乎蓋四宗之源發於此也馬駒之讖定於此矣及向馬師磨磚馬問磨磚作麼曰作鏡曰磨磚豈得作鏡曰坐禪豈得成佛只此一句臨濟宗旨大振矣雲門亦具焉及問如何即是曰如牛駕車車若不行打牛即是打車即是則溈仰法眼始於此馬祖曰藏頭白海頭黑日面佛月面佛有時喝有時打此臨濟宗也僧參次師𦘕一圓相云入也打不入也打僧才入師便打僧云和尚打某甲不得師靠柱杖休去只此一則便四宗齊收也震聲一喝於百丈挂拂之後三日耳聾於黃檗吐舌之前三頓痛棒大樹蔭天臨濟一宗岧然五宗之頂從威音至此而乳中醍醐精極妙極馬駒踏殺天下人鍾意不在是乎是知大愚肋下三拳密闔顯開橫分竪結踏四家而獨步出三句以咸羅四料簡盡人境法以褫其大綱三玄要卷生死關而歸于頂獨道法細分始能事事心佛二三同一方可句句斷玄影草動則主在我而驗人金剛提則力在腕而破物師踞有地浮泛者未識來由喝本無從認真者定迷落處兩堂一喝陸遜迷八陳之圖兩處讓賓諸葛有隱蓬之䇿二禪客賓主成於升座四賓主機用毒於膠盆或學人先喝以挑鋒須防伏卒或知識隨奪而掠陳貴設陷坑或夫唱而婦隨或分疆而裂土相共一場懡㦬放收兩換交加囊沙減竈各顧成功自縛詐降獨施冷刺呢呢喁喁而隱蠆轟轟靂靂而濡尾用鏌鎁於太平之後提祖印於未定之天舉頭天外誰是其人掛鏡當軒豈容魔異待心死而伏誅須切用前之照先擒下而去續略挑用後之燈濟船筏於黑風鬼國之間開晴霽於碧浪通歌之外頭頭為求格外著著要了機先了法者盡法而無民亡人者隨人而施藥撫猊絃而絶衆聲滴獅乳而迸驢酪從遮裏過得向隨處安間行雲行雨不濕仙衣驅電驅雷豈關天怒興化得於脫下衲衣之一頓向古廟裏藏身致使克賓於棒了處更罰錢出院南院拈出啐同時失之便打終令那僧於棒折處見燈影裏行風穴從守廓處入玄要法門便於南院處賓主歷然識破詐道不饑領棒下無師之旨法華於古路上不墮悄然向白兆處草賊大敗好手不肯張名見太平斬癡之略汾州見象王行處絶狐踪遂到放身命處石霜從掩口知道出常情解道荒草裏行楊岐截路打慈明知是般事便休辭雲竟入亂峰深處既向兩喝後禮拜復於擔荷處便行會老失笑驚白雲會得箇中便了放手撲到萬仞崖底有時擲下柱杖有時放過一著五祖演不會興化古廟裏話會白雲一叱便解轉磨既得出身白汗廣展下載清風昭覺勤盡五祖機用邊事由演師不肯及再領柏子復證雞鳴雖會一串穿却還合頂𩕳添眼虎丘隆至見不及處舉拳解道竹密不妨流水過終成睡虎應菴華舉放泥盤處大笑解道禹力不到處河聲流向西方見真獅華藏傑以拄杖兩卓一拋道三十年後已全面目破菴先於不心不佛物處將拄杖一卓略見一斑無準範道三人證龜成鱉真不缺少雪嵓欽道三拳三拜是同許會三玄高峰妙以龍頭蛇尾輥作一團中峰本於脫衣一頓許你半箇千嵓長見鼠食猫飯碗破矣而碎甓萬峰蔚見淨瓶踢倒鈍漢已而三十寶藏持承三要印來爪牙不少東明旵賴重新悟來到底無遺寶峰瑄語若流雲出身有路天奇瑞當賓不讓去有來由無聞聰深水裏出頭石中迸火笑巖寶操履中兼用水裏有龍幻有傳一點燈花虗空𪹼破金粟悟一棒到底不管主賓三峰藏挽臨濟七百年之大法頭尾宛然水雲中飛騰隱顯何處摸索兩脉合宗其來有據臨濟一宗至汾陽慈明而益大起明出楊岐自虎丘臻雪巖高峯千巖萬峯以及笑巖之後法道復當再振已正敘其脉矣其於石霜之下出有匾頭道人黃龍南公者初未悟時因雲峯悅所激指見慈明明問臺山婆子話不能答明詬罵不已師曰罵豈慈悲法施耶明曰汝作罵會那師乃悟旨其下有寶峯真淨克文禪師往見黃龍不契至香城見順和尚順問甚處來曰黃龍來曰黃龍有何言句曰黃龍近日州府委請黃檗長老龍埀語曰鐘樓上念讚床腳下種菜有人下得語契便往住持時勝上座云猛虎當路坐龍遂令去住黃檗順不覺云勝首座祇下得一轉語便得黃檗住佛法未夢見在師言下大悟黃龍用處座下有清凉慧洪覺範禪師者文每為舉玄沙未徹之語發其疑凡有所對文曰你又說道理耶一日頓脫所疑述偈曰靈雲一見不再見紅白枝枝不著花叵耐釣魚船上客却來平地漉魚蝦真淨見而為之助喜吾嘗參三玄之旨有深得欲求決諸方而難其人忽見師著臨濟宗旨及智證傳之臨濟兩堂首座同喝語今古心心如覿面相印復檢其法嗣未有續之者因願遙嗣其宗旨而現在法脉則傳笑巖之後焉蓋不敢負高峰語録之發起也因敘臨濟正脉而專志於此雲門宗自威音一字金圈拋出從七佛諸偈錦字文回六祖傳來一個鉢盂囫圇咬嚼不得馬師之後這箇眼目淺草易為長蘆天王惠餅崇信檠茶直下便見擬思即差德山吹滅紙燭於龍潭正是截流雪峰胸襟流出於巖頭豈非函蓋所以韶陽霎時折足於睦州門縫裏溫研積稔於雪峰堂奧中便道三斤麻一匹布攛鱉鼻於南山脫鐵枷於老漢燭露確師而咄嗟須彌胡餅而恰好諸佛出身處東山水上行透法身之句北斗裏藏身鉢裏飯桶裏水三昧塵塵南山雲北山雨佛交露柱將三門來燈上放糊餅作饅頭晉鋒八博咄中眉故有紅旗閃爍之品題此雲門一派所由出也溈仰宗一星火𪹼於無有雙關之表三撼門扇於昧落兩頭之間溈山僧水牯牛腰下看取東平鏡溈山鏡手中撲破所以凡聖兩忘見履兼盡用處則單刀直入思無則靈焰何窮插鍬拔鍬埀腳結腳平目仰視於收放不獨一二二三而劒刃惟單兩口無舌九十六相雲興父子合宗溈仰一枝喬出法眼宗七佛偈意全是修多羅了義語而儼然獨露臨濟雲門溈仰等旨惟曹洞回互則不待拈提而自著焉故知法眼一家全是教家極則一代時教之真月也達磨傳來若覔心不可得明鏡亦非臺即心即佛非心非佛等語至於天王聞馬祖言識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿言下便悟龍潭聞天王言汝檠茶來吾為汝接汝行食來吾為汝受汝和南時吾便低頭何處不指示心要師低頭王曰見則便見擬思即差師曰如何保任王曰任性逍遙隨緣放曠但盡凡心別無聖解德山曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑此便是法眼張本也雪峰於岩頭處悟得個他日若欲播揚大教一一從自己胸襟流出自然蓋天蓋地遂有玄沙從楞嚴經發明心地由是應機敏捷與修多羅冥契沙問地藏曰三界惟心汝作麼生會藏指椅子曰和尚喚這個作什麼沙曰椅子藏曰和尚不會三界惟心沙曰我喚這個作竹木汝喚作甚麼藏曰桂琛亦喚作竹木沙曰盡大地覔一個會佛法底人不可得藏自爾加勵及悟後住地藏問法眼曰作麼生是行腳事眼曰不知曰不知最親切又論肇論至天地與我同根處藏曰山河大地與上座自己是同是別眼曰別藏竪二指眼曰同藏又竪二指便起去藏又問上座尋常說三界惟心萬法惟識乃指庭石曰且道此石在心內在心外眼曰心內藏曰行腳人著甚來由安片石在心頭眼窘求住藏曰若論佛法一切現成法眼於是大悟所以道會得聲色問處透聲色也不難識得凳子來由周匝有餘都了慧超咨和尚如何是佛曰汝是慧超僧問如何是曹源一滴水云是曹源一滴水正是山河在我眼裏自己只在目前鳥啼花落水茫茫月白風清山楚楚說甚惟心惟識豈關句裏言前六相義金絡索掛來四法界玉連環拋出總是弄猢猻圈子祭鬼神茶飯何用將心湊泊頭頭釘釘膠粘不如信手拈來處處箭鋒相拄以致永明博綜於宗鏡座主倣佛於言詮此祖宗妙極而流弊痛挽之惟望後人之實證也曹洞宗威而音音而威者五位前後事也五位無位而位者也威音已前空劫也威音至此今時也今時無空劫則非今空劫非今時即非古今古一其為偏乎正乎正之偏乎偏之正乎偏正兼至乎正偏兼到乎吾不知而知知而邈然於威音之先矣故曰身從無相中受生猶如幻出諸形相幻人心識本來無罪福皆空無所住是也七佛皆然矣而世尊降生一手指天一手指地周行七步目顧四方曰天上天下惟吾獨尊至臨末稍頭伸出雙趺以示迦葉一期大事不過如此西天初祖迦葉尊者因外道問如何是我我者曰覓我者是汝我外道曰這個是我我師我何在者曰汝問我覓二祖阿難偈曰本來付有法付了言無法各各須自悟悟了無無法三祖商那曰說是心法時是法非心法四祖優波毱多五祖名提多迦香衆來求出家多曰汝身出家心出家答曰我來出家非為身心曰不為身心復誰出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然毱乃度之香衆後有偈曰通達本法心無法無非法悟了同未悟無心亦無法六祖彌遮迦見一人手執酒器逆而問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否曰觸器而負淨者曰師識我否曰我即不識識即非我七祖婆須密因論義謂八祖佛陀難提曰仁者論即不義義即不論若擬論義終非義論九祖伏䭾密多曰父母非我親誰是最親者及謂香蓋子偈曰真理本無名因名顯真理十祖脅尊者問十一祖富那夜奢曰汝從何來曰我心非往曰汝何處住曰我心非止祖曰汝不定耶曰諸佛亦然曰汝非諸佛曰諸佛亦非十二祖馬鳴問曰我欲識佛何者即是富那曰汝欲識佛不識者是馬鳴謂十三祖迦毗摩羅曰隱顯即本法明暗元不二今付悟了法非取亦非離迦毗謂十四祖龍樹曰非隱非顯法說是真實際悟此隱顯法非愚亦非智龍樹於座上現自在身如滿月輪一切衆惟聞法音不覩祖相彼衆中有長者子名迦那提婆謂衆曰識此相否衆曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之蓋以無相三昧形如滿月佛性之義廓然虗明言訖輪相即滅復居本位十五祖迦那提婆因外道論義外曰我欲得佛提曰我灼然得佛外曰汝不合得提曰元道我得汝實不得外曰汝既不得云何言得提曰汝有我故所以不得我無我我故自當得十六祖羅羅多答十七祖僧迦難提偈曰我已無我故汝須見我我汝若師我故知我非我我難提聞風鈴鳴問十八祖伽耶舍多曰鈴鳴耶風鳴耶多曰非風鈴鳴我心鳴耳祖曰心復誰乎曰俱寂靜故多入十九祖鳩摩羅多舍鳩問是何徒衆祖曰是佛弟子鳩聞佛號心神竦然即時閉戶祖良久扣其門鳩云此舍無人祖云答無者誰鳩遂開門鳩摩羅多謂二十祖闍夜多曰汝雖已信三業而未明業從惑生惑從識起識依不覺不覺依心心本清靜無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如幻夢闍夜多謂二十一祖婆修盤頭弟子曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道此兼叶之旨也婆修盤頭偈曰泡幻同無礙如何不了悟達法在其中非今亦非古二十二祖摩拿羅曰隨流認得性無喜亦無憂二十三祖鶴勒那因二十四祖師子問我欲求道當何用心祖曰汝若有用即非功德汝若無作即是佛事師子偈曰正說知見時知見俱是心當心即知見知見即於今二十五祖婆舍斯多付法二十六祖不如密多偈曰聖人說知見當境無是非我今悟真性無道亦無理密多謂二十七祖般若多羅曰真性心地藏無頭亦無尾應緣而化物方便呼為智般若多羅付東土初祖偈曰心地生諸種因事復生理果滿菩提圓花開世界起二祖神光問此土初祖曰我心未安乞師安心祖曰將心來吾與汝安曰覓心了不可得曰與汝安心竟僧燦三祖懺罪亦同道信四祖逢一小兒問子何姓曰姓即有不是常姓曰汝無姓耶曰性空故無度為弘忍五祖五祖欲付法神秀偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃慧能六祖曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃青原參六祖問曰當何所務即不落階級祖曰汝曾作什麼來曰聖諦亦不為祖曰落何階級曰聖諦尚不為何階級之有石頭希遷初參青原原問子何方來曰曹溪曰將得甚麼來曰未到曹溪亦不失曰若恁麼用到曹溪作麼曰若不到曹溪爭知不失遷又曰曹溪大師還識和尚否原曰汝今識吾否曰識又爭識得原曰衆角雖多一麟足矣石頭著參同契以明暗回互懸起曹洞宗旨有所來矣藥山一日在石上坐次石頭問汝在這裏作麼曰一物也不為曰恁麼則間坐也曰間坐即為也頭曰汝道不為不為個甚麼曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可明頭埀語曰言語動用沒交涉師曰非言語動用亦沒交涉頭曰我這裏針劄不入師曰我這裏如石上栽花雲岩曇晟禪師於藥山悟後煎茶次道吾問煎與阿誰師曰有一人要曰何不教伊自煎師曰幸有某甲在上堂曰有個人家兒子問著無有道不得底洞山出問他屋裏有多少典籍師曰一字也無曰爭得恁麼多知曰日夜不曾眠洞山於無眼耳鼻舌身意不覺捫面問師既聞水鳥樹林念佛猛省無情說法邈師真於良久覩渠面于水中跌倒幻人拾起縛草向泠路上熱閙於爐炭裏凝水藏身無影只見其聲全體現前不逢其面毒龍蟠處水偏清頑石堆頭雲欲起銀碗盛雪氷花與火焰齊輝挾後位而攢踴黑夜烏雞舜惹與虗空都碎帶共功而不斷五子同歸一父那知祖業之崇四臣咸戴一君豈謂上皇之治五位分而盡了不了薪火既滅世界方炎一位圓而無圓之圓花木摧殘陽春常滿見消行起行滅道亡睡中開眼喫茶飯後洗盂就坐鐵脊梁竪處朧朧似夢犀角枕倒來漠漠無天閙市裏水流花落事忙中馬去牛來既分和叶于君臣當辨賤貴于王子賤分外紹貴從內紹未識極頭進於極頭門內人趨向裏頭事是朝生之臣種歸王既識極頭擔荷極頭裏頭人不擔屋裏事是誕生之王種忘父忘父者食父而滅祖故曰內生無家者閉宮而令行故曰化生末生未知兩紹真王不類五兒貴賤俱消淺深不立石霜九峰舌結章師悟老技窮相續大難豈容付授悲末世一悟便了之魔人故曰人多乾慧示將來三漏須盡之法網當知悟餘濁智機不離位好女不著嫁時衣見處偏枯盲兒不放雙拄杖究妙失宗休坐法機昧終始要通宗透此者不是乾蘿蔔頭知此者猶坐水屙漉地金針雙鎖鴛鴦交頸分飛誰云玄路金鎖玄路藤樹合枝並起豈曰鳥道直須事理不涉電火難追展手不如吐舌一老一不老半肯半不肯擊首誰能應尾所以曹山觸毒三墮浪分溈山水牯牛水牯牛溈山奈何不得是國王水草非國王水草隨納非污撲破鉢盂不獨五馬不嘶抑且一牛不飲頺然方丈不特闍黎不知抑且侍者不管閉眼伸出被底裏指頭誰云師子看山踏斷腳頭邊鞋鼻不道死蛇故曰莫行心處路不挂本來衣何須正恁麼切忌未生時黑漆地履踐當問景欣埀衣裳致治不知堯舜奈何者未覩影而傳寶鏡才入室而伏繩床評唱繁興首帕遍布此法道之可悲也痛為其宗者務使親到可耳總結得心於自得法於師師有人法之分心有本別之異根本智者自悟徹頭徹尾者是差別智者自悟之後曲盡師法以透無量法門者是良以師必因人人貴法妙分宗列派毫髮不爽故傳法之源流非獨以人為源流也所以六祖一華而出二枝南嶽懷讓青原行思是也讓出四葉自馬祖道一一出百丈懷海海出黃檗希運運出臨濟義玄一也百丈出溈山霛祐祐出仰山慧寂二也自馬祖出天王道悟悟出龍潭崇信信出德山宣鑒鑒出雪峰義存存出雲門文偃三也雪峰出玄沙師備備出地藏桂琛琛出法眼文益此馬祖一枝之四葉也青原一枝出一葉自石頭希遷遷出藥山惟儼儼出雲嵓曇晟晟出洞山良價價出曹山本寂此青原一枝之一葉也大矣哉威音王已前無物也威音王已後無物也無物之物不可以言到心師也其也彈丸迸出透頂處忤逆聞雷迅電突來過眼時紅旗閃爍裂作兩開而火見處處斷橫古路控成雙結而中虗遠遠馳書不到家不知自己為何物謾道三界為惟心滴水答曹源滴水慧超原汝是慧超分明打劫就窠爭奈巡人犯夜羅五家之四面突臨濟之正宗所以從威音一點闢開至臨濟一囊收納雲門本出睦州於黃檗豈外滹沱溈仰自續風穴于首山還歸慧照曹洞到浮山而率賓歸王法眼雖入教而難逃至化惟此一事實餘二則非真臨濟兒孫既專大任敢負前宗一悟便了而無餘是增慢者一槌便就而莫勤是淺丈夫當知大器晚成切莫半途而廢師承在宗旨不在名字源流證悟盡差別焉可根本坐定痛快者翻成跋扈廉纖者到底纏綿纏綿尚有脫時跋扈終成異路殷勤至再叮囑萬千幸勿掃宗旨以藏拙正當究宗旨而竭情情竭細除人忘法滅方可為人師表紹佛先宗善自護持無令斷絶傳衣法注世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告曰吾以正法眼藏密付于汝汝當護持并敕阿難副二傳化無令斷絶而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽黎衣傳付於汝轉授補處至慈氏佛出世勿令朽壞迦葉聞偈頭面禮足曰善哉善哉我當依敕恭順佛故鶴勒那尊者謂師子尊者曰吾師密有懸記罹難非久如來正法眼藏今當付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即於今祖說偈已以僧伽黎密付之至達磨大師謂可大師曰內傳法印以契證心外付袈裟以定宗旨後代澆薄疑慮競生云我西天之人言汝此方之子憑何得法以何證之汝今受此衣法却後難生但出此衣并我法偈用以表明其化無閡至我滅後二百年衣止不傳法周沙界明道者多行道者少說理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰我本來茲土傳法救羣迷一花開五葉結果自然成後六祖因五祖擊碓夜入祖室五祖以袈裟圍祖不令人見以所傳袈裟用付于汝善自保護無令斷絶聽我偈曰有情來下種因地果還生無情既無種無性亦無生六祖問曰法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也於密注曰多子塔前傳法者懸記此法祖脉佛脉兩無斷絶之時也世尊與迦葉分座者示祖佛位同佛在世即佛授法于祖佛滅度即祖授法於佛指佛以法身為重也僧伽黎圍之以授法者正法以衣相密為心印也凡有難及難信處即衣法同傳也正法眼藏者師師相傳之法眼也不言涅槃心者以人人自悟之心各各固有只在正法眼藏印定以為師法也敕阿難副二者言展轉承化而代不乏人也偈言法本法無法四句者指伽黎而授其法相之義也將金縷僧伽黎衣傳付于汝轉授補處慈氏佛者示前以法正授於祖茲以法一付於佛意後佛當親授祖法而後化行也達磨曰內傳法印以契證心外付袈裟以定宗旨者正以宗旨在衣上以印所傳契證之自心也却後難生但出此衣并示法偈用以表明其化無礙者蓋以人但信有自悟之門更不信師法有忘悟了心之妙故用衣以表明令人悟之又悟以盡差別智也差別盡而根本之惑始盡矣至我滅後二百年衣止不傳法周沙界者蓋悟心得法者多悟必盡法而後已不待一一以衣表示也明道者多行道者少者言自悟者單明心道若無法曲盡差別智故不能行也說理者多通理者少者言說理者乃不悟心而但傳法者也通理者自心宗旨兩得證悟者也此叮嚀得心必得法而後能行得法必得心而後實證二者不可缺一故當以法潛符密證也潛符密證千萬有餘者言世尊於多子塔前付囑無令斷絶定當心法不斷故千萬有餘也汝當闡揚勿輕未悟一念回機便同本得者言人不論根器上下但不悟耳若示之一念回機便同本得本得之心與法符契即與祖佛不二也傳法度羣迷者言傳者法不言有悟可傳人也五祖以袈裟圍六祖不令人見而傳法者正是多子塔前故事至六祖後人皆知信此實相無相之法相也皆言表信而用衣正重信有宗旨耳嗚呼宗旨其可不信乎宗旨而不信更用佛祖相傳為哉更用源流名字為哉故五宗恐其法滅也顯言宗旨以付授付授之久因不悟心者認有法可傳而學法不參心也故後之悟心豪傑欲抹殺宗旨單存悟見也此心法不同各偏之斃耳茲直注佛祖相傳之心法以示心法同傳之旨願後人信之則多子之讖不誣而千萬有餘之言始實矣若必重自悟而抹殺相傳之法必非悟心之士也何以故以其見有法故見有法即與自心違故既悟見有法則所悟之心亦僞故嗚呼自心師法不可動著動著則入地獄如箭射濟宗頌語附萬峰法藏著學人上履閲余自力參於折竹聲中得個前後際斷頓見青州衫意旨便能棒棒見血箭箭中的復參睡中主了得高峰枕落雪嵓古柏千古同心因知道無終窮力參不已閉關日夕究其不可究處所以深入濟上堂奧旁及四家兼之旁出諸禪得大慧所謂禪備衆體之妙其三玄三要四賓主等大法小法都從達磨密授二祖之七佛偈西天四七傳心法要授受至於六祖而出南嶽青原兩家大振所以有百丈再參馬祖因緣盡以從上諸法做出面目百丈以三日耳聾傳之黃檗黃檗以三頓棒傳之臨濟濟恐宗旨太密傳久失真而變為一橛頭粗惡淺小之禪單可自了不能為人故與普化克符等建立宗旨名相千變萬化收歸兩堂一喝分為賓主以授三聖大覺三聖大覺約示而廣演互相激揚以授興化祖佛之法至化而曲盡其妙不可勝言矣其時鹿門等承虗接響幾喪宗旨幸有守廓為發明之斯道賴以不泯繼之兜率聞於清素覺範得於歸宗深慮遠傳各為闡發臨濟一脉七佛諸偈具在典章政所謂文獻若足吾能徵矣後世以高峰中峯之下屢遭世亂其間諸家傳法弟子給侍不久宗旨漸疏迄我明初幾希殘燼至於關嶺而及笑巖其徒廣通公者自因不識正宗妄以蠡測乃序笑巖集遂云曹溪之下厥旁岐縱橫肆出厥奇名異相涯岸各封以羅天下學者因誣其師為削去臨濟不欲承嗣將調截枝泝流以復本原另出名目曰曹溪正脉其說一唱人人喜于省力易了遂使比年已來天下稱善知識者競以抹殺宗旨為真悟致令無賴之徒無所關制妄以雞鳴狗盜為習稱王稱霸無從勘驗誠久假而不歸矣嗚呼臨濟果為旁岐乎宗旨果為奇名異相之縱橫肆出乎其法果為羅籠天下而設乎入其法者果若密室傳授之僞異乎曹溪之下南嶽青原五家宗旨果皆旁出而紛紜妄號正宗者乎此何異於圭峯數南嶽為泛徒者哉後世豈無明眼者笑斥耶寧不聞笑巖上堂舉世尊升座公案時有僧出作禮劈脊便打云多口作麼僧云某甲一言也未何為多口巖復打云再犯不容翌日上堂云昨舉公案未圓未能解得諸人惑未能與世尊把臂共行何謂若是知音作者才恁麼便不恁麼然後沒交涉直教兩頭撒開中間放下自然活卓卓底隨處作主如水投水似空合空佛祖不能知鬼神莫能測又僧問如何是奪人不奪境巖云一文錢一個燒餅云如何是奪境不奪人云喫在肚裏了時下飽欣欣云如何是人境兩俱奪云你無一文錢只得甘受餓云如何是人境俱不奪云雲門餅金牛飯空腹而來飽腹歸此豈不是笑巖之濟宗乎終日聞笑巖語見笑巖録乃立妄論以誣笑巖為見外臨濟不亦過且謬乎豈不聞愛禮存羊之論毋令斷絶之教乎茲幸金粟一枝仍用黃檗三頓痛棒示人而三玄賓主固在也不肖勉為承嗣力唱此宗為萬世不易之定衡奈何一唱而和寡未能弘暢達以救臨濟法滅之虞敬原五宗而復以馬祖一脉的傳公案細細頌出手授二三子之自悟自入者互相激揚務使此宗再起毋令斷絶以報佛恩若曰達磨西來本無一字而復添此叨叨者耶將應之曰七佛偈并諸讖語子將以為文字乎乃俟其開口便掌以絶夫後世野狐之種云舉百丈再參馬祖侍立次祖目視繩床角拂子丈曰即此用離此用祖曰汝向後開兩片皮將何為人丈取拂子竪起祖曰即此用離此用丈掛拂子於舊處祖振威一喝丈直得三日耳聾未幾住大雄山以所處巖巒峻極故號百丈四方學者至一日謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌丈曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫丈曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜又仰山云此是顯大機大用且道如何是大機之用著語云鞍前電閃馬後雷轟又云行了春風有夏雨頌云盡道英雄志可伸長驅席捲見精神胡蘆谷斷撩天火一馬為龍得幾人如何是大機大用著語云禹門三汲浪平地一聲雷頌云放去收來任自由突然翻轉尾和頭曾經三峽瞿塘險跨竈馨兒也大愁既有大機之用則如何是大用之機著語云不因漁父引爭得見波濤頌云鉢下袈裟窟裏身英雄當日逞將軍蒙山去後南宗振避石猶傳萬古勳如何是大底道理著語云碩果不食頌云斷水窮山不憚煩桃花流盡見仙源自從一落漁人眼世上相傳有浪言馬祖而下早有賓主句矣其源蓋出於再參公案中且道如何是百丈再參之賓中主著語云周郎功就漢有荊州頌云早施約法次關中示玦烹翁霸正雄子夜楚歌虞帳冷千秋無面見江東如何是主中賓著語云夏至前頭隔夜定頌云東階先揖致殷勤北面擎觴禮讓頻去盡驕淫見真實從來入聖本於仁如何是主中主著語云雨過旱雷轟頌云何處聲榔擊破秋掉翻輕艓擲魚鈎夜蟾不識湖深冷沉到龍窩極底頭主中主從那裏得來著語云饒人多主顧頌云頽然閫外付將軍開國成家豈別人不是埀衣拱手貴萬何以致來賓舉興化在三聖為首座常曰我向南方行腳一遭拄杖頭不曾撥著一個會佛法底人聖云具個什麼眼便恁麼道化便喝聖云須是你始得著語云冷光微露毒殺熱謾頌云全提劫外過春風才見花開雨濕叢縱使青皇未零亂已看滿地是殘紅興化到大覺覺問我聞你道向南方行腳一遭拄杖頭不曾撥著一個會佛法底人你憑個什麼道理與麼道化便喝覺便打化又喝覺又打明日相逢覺云我昨日疑你遮兩喝化又喝覺又打化再喝覺亦打著語云何勞再勘頌云一回雨過一回香轉見花深夏日長燕子尚疑春富貴喃喃猶自語高梁化云某甲於三聖師兄處學得個賓主句總被師兄折倒了也願與某甲個安樂法門覺曰遮瞎漢來遮裏納敗闕脫下衲衣痛與一頓著語云若不脫下爭得見骨化於言下荐得臨濟先師於黃檗處喫捧底道理且道如何是三度痛棒底道理著語云彩雲歸盡月當空頌云洗盡胭脂素體香多知嫂囑細姑娘翻思父母當年事恩大難酬只自傷舉守廓侍者到華嚴值嚴上堂曰大衆今日若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何便請單刀直入華嚴與汝證據廓出禮拜起便喝嚴亦喝廓又喝嚴亦喝廓禮拜起曰大衆看遮老漢一場敗闕又喝一喝拍手歸衆且道華嚴敗闕在甚麼處著語云既無推讓之德那復見義不為頌云東和北拒䇿應高前失吞吳後棟撓八陳至今騰怨氣數堆頑石怒江濤守廓到鹿門見楚和尚與僧話次門問楚曰你終日披披搭搭作麼楚曰和尚見某甲披披搭搭那門便喝楚亦喝各休去廓曰你看遮兩個瞎漢隨後便喝著語云向遮裏入門歸方丈請廓問云老僧適來與楚闍梨賓主相見甚處敗闕廓曰轉見病深門曰老僧自興化來便會也廓曰和尚到興化時某甲為侍者記得與麼時語門云請舉看廓遂舉興化問和尚甚處來尚云五臺來化云還見文殊麼尚便喝化云我問你還見文殊麼又惡發作麼尚又喝化不語著語云從三聖處學得來和尚作禮至明日教某甲喚和尚和尚早去也化上堂云你看遮個僧擔條斷貫索向南方去也已後也道見興化來著語云人去歌援瑟廓云今日公案恰似與麼時底門云興化當時為甚無語著語云好個疑團廓曰見和尚不會賓主句所以不語著語云拖却長裙作老婆及欲喚和尚持論和尚已去也門特煎茶告衆曰參學龍象直須子細云云且道如何是斷貫索著語云只嫌自己麻繩短莫怨他家井底深頌云逢師兩喝硬如雷誰料殷勤為汝悲縱使再三千百喝一條斷索繫頭回如何是會賓主處著語云何不轉身看頌云輕輕撥著萬斤鎚腦後潛過夢裏雷三聖家風千古祕幾人真到玉山頽舉臨濟兒孫從五祖與佛鑑鑑與妙喜𮞏代俱以溈山安有句無句如藤倚樹樹倒藤枯句歸何處溈山呵呵大笑歸方丈公案為最後事圓悟曰相隨來也且道如何是相隨來也的道理著語云倒翻斤斗抱球兒頌云踏轉雙輪駕白牛四衢風氣肅三秋笑歸方丈還錢去明月團團嶺上頭又為道吾捺倒爛泥裏有判者云也只是館驛裏撮馬糞漢且道如何是馬糞著語云青蠅不附驥尾頌云夜追鞭影過橋東踏著深春柳下風欲理羈韁向人道亂絲空把月明中舉圓悟問大慧云踞虎頭收虎尾第一句下明宗旨如何第一句慧云此是第二句且道如何是虎頭虎尾如何是踞收如何是第一句下明宗旨著語云藏六斷蛇頌云樹頭樹底覓殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風舉五祖演云牛過窗櫺頭角四蹄都過了只有尾巴過不得如何是四蹄如何是尾巴如何是過不得著語云好肉𭺗瘡痛不徹頌云十指為拳劈面槌西風颯颯起春雷霜前雪後分明事誰道一陽冬至回濟宗頌語終萬峯學人嚴拱法名上履捐資刻五宗原暨濟宗頌語全卷伏願了知宗旨證入真乘更願得見得聞同參同薦者時大明崇禎龍飛元年歲次戊辰四月佛誕日識
