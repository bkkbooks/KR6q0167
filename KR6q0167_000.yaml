front:
  text: 五宗原序歲乙丑結夏聖恩禪寺之萬峰關侍關中者四上座敏致證徹也居一日俱整衣作禮而請曰嘗聞諸方尊宿欲抹殺五家宗旨單傳釋迦拈花一事謂之直提向上然不知五宗之立果為謬妄者否願賜一言以通其難於密曰命將者必以兵符悟心者必傳法印符不契即為姧偽法不同則為外道自威音已來無一言一法非五家宗旨之符印也昔人證之遂默契其微而不分後人侶之故建立其宗以防偽抹殺五家而欲單傳者剖符銷印自便之渠魁者耳豈五宗之忠臣七佛之法將也耶嗚呼法滅天人憂政以此也可不畏哉曰昔時有燒香煉頂密傳宗旨者大慧一榜揭出以破狐技然則今之宗旨又何貴焉曰彼所傳者竊符假信者耳若夫法法自明心心相印者豈若室中密授之死法子耶蓋傳宗旨者不悟宗旨者也抹宗旨者不知宗旨者也茲當操提未破之密印以擒託偽之姦黨此政今時荷擔如來命脈之真子也豈浮濫者可混入哉因原五宗付諸四子子稽首謝各各願嚴符印以永真傳云崇禎戊辰歲春日萬峰法藏於密氏序
